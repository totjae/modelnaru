name: modelnaru

services:
  gateway:
    image: nginx:1.28-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '${APICHAT_HOST:-127.0.0.1}:${APICHAT_PORT:-32432}:8080'
    volumes:
      - ./deploy/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://127.0.0.1:8080/gateway-health',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - frontend

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - frontend

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    environment:
      API_PORT: 3001
      APICHAT_CONFIG_FILE: /app/config.yaml
      NODE_ENV: production
    user: '${APICHAT_UID:-1000}:${APICHAT_GID:-1000}'
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./secrets:/app/secrets:ro
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - frontend
      - backend

  migrate:
    build:
      context: .
      target: api
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    command: ['pnpm', '--filter', '@modelnaru/database', 'migrate']
    environment:
      APICHAT_CONFIG_FILE: /app/config.yaml
      NODE_ENV: production
    user: '${APICHAT_UID:-1000}:${APICHAT_GID:-1000}'
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./secrets:/app/secrets:ro
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: modelnaru
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: modelnaru
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U modelnaru -d modelnaru']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ['valkey-server', '--appendonly', 'yes']
    volumes:
      - ./data/valkey:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  admin-tool:
    build:
      context: .
      target: admin
    profiles: ['tools']
    environment:
      APICHAT_CONFIG_FILE: /deployment/config.yaml
      APICHAT_GID: '${APICHAT_GID:-1000}'
      APICHAT_UID: '${APICHAT_UID:-1000}'
    user: '${APICHAT_UID:-1000}:${APICHAT_GID:-1000}'
    working_dir: /deployment
    network_mode: none
    volumes:
      - ./:/deployment

networks:
  frontend:
  backend:
    internal: true
