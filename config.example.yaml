version: 1

server:
  host: 127.0.0.1
  port: 32432
  publicBaseUrl: https://chat.example.com
  trustProxy:
    enabled: true
    addresses:
      - 127.0.0.1/32
  shutdownGraceSeconds: 30

admin:
  username: admin
  passwordHash: '$argon2id$v=19$m=19456,t=2,p=1$replace-with-apichat-admin$replace-with-apichat-admin'
  totpSecret: REPLACEWITHAPICHATADMIN
  requireTotp: true

database:
  urlFile: ./secrets/database_url

storage:
  root: ./data/uploads
  temp: ./data/temp
  attachmentRetentionDays: 30
  minimumFreeBytesForUpload: 21474836480
  warningFreeBytes: 42949672960

security:
  cookieSecure: true
  cookieSameSite: lax
  allowedHosts:
    - chat.example.com
  csrfEnabled: true

sessions:
  maximumActivePerAccount: 3
  idleTimeoutHours: 24
  absoluteTimeoutDays: 7

limits:
  maximumGlobalAiGenerations: 3
  maximumAiGenerationsPerUser: 2
  maximumPdfWorkers: 1
  maximumOcrWorkers: 1
  maximumFileBytes: 10485760
  maximumAttachmentsPerMessage: 10
  maximumPdfPages: 100

logging:
  level: info
  directory: ./data/logs

providerSecrets:
  masterEncryptionKeyFile: ./secrets/provider_master_key
